---
minor_changes:
  - "client_settings, client_settings_info - Extract shared C(Format-ClientSettingResult) and
    C(ConvertTo-ClientSettingTypeString) into a new C(module_utils/_ClientSettingUtils.psm1)
    to eliminate code duplication."
  - "device_collection, device_collection_info - Extract shared C(ConvertFrom-CMRefreshType)
    into a new C(module_utils/_DeviceCollectionUtils.psm1) to eliminate code duplication."
  - "maintenance_windows, maintenance_windows_info - Extract shared C(Format-MaintenanceWindowResult)
    and C(ConvertTo-ServiceWindowTypeInt) into a new C(module_utils/_MaintenanceWindowUtils.psm1)
    to eliminate code duplication."
  - "boundaries, boundaries_info - Extract shared C(Format-BoundaryResult) and
    C(ConvertTo-BoundaryTypeInt) into a new C(module_utils/_BoundaryUtils.psm1)
    to eliminate code duplication."
bugfixes:
  - "maintenance_windows_info - Fix C(name) filter returning all maintenance windows instead of
    the named one by switching from the C(-Name) alias to the canonical C(-MaintenanceWindowName)
    parameter and adding C(-DisableWildcardHandling) to prevent wildcard interpretation of
    the window name. Same fix applied to the three lookup calls in C(maintenance_windows)."
  - "device_collection - Remove incorrect C(default: Manual) documentation field from
    C(refresh_type); the parameter has no spec-level default and the conditional creation
    behaviour is already described in the option description."
