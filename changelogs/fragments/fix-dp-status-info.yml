---
bugfixes:
  - "dp_status_info - Fix empty results for package-only and site-wide queries by replacing
    broken C(Get-CMDistributionStatus -InputObject $dp) calls with C(-PackageId) and bare
    invocations that match how the cmdlet is designed to be used."
  - "dp_status_info - Fix C(distribution_point) and C(distribution_point_group) filters
    returning no results; per-DP status is now queried via C(SMS_PackageStatusDistPointsSummarizer)
    over local CIM, which works correctly for group-distributed content and avoids WinRM
    double-hop authentication failures."
  - "dp_status_info - Fix C(distribution_point_group) with a non-existent or empty group
    returning all records instead of an empty list."
