---
breaking_changes:
  - "install_updates - Remove O(allow_reboot) and O(reboot_timeout_minutes) parameters.
    The module no longer reboots the system itself; instead it returns RV(reboot_required=true)
    and the caller is expected to handle the reboot using M(ansible.windows.win_reboot).
    This avoids dropping the WinRM connection mid-task before results are returned."

bugfixes:
  - "install_updates - Fix C(Unable to cast object of type
    'Microsoft.Management.Infrastructure.Native.InstanceHandle' to type
    'System.Collections.IList') error when calling C(CCM_SoftwareUpdatesManager.InstallUpdates).
    The C(CCMUpdates) argument is now explicitly cast to C([CimInstance[]]) so the CIM
    infrastructure marshals the collection as a typed array that satisfies the IList
    contract expected by the native WMI method."
  - "install_updates - Fix module returning immediately without waiting when
    O(wait_for_completion=true). Incorrect C(EvaluationState) mappings caused states
    such as C(7) (Installing) and C(0/1) (Available, seen immediately after triggering)
    to be classified as terminal failures, setting C(in_progress=false) and exiting the
    polling loop on the first iteration. All non-terminal states now correctly set
    C(in_progress=true) so the loop waits until installation completes."
  - "install_updates - Fix RV(installed_updates) and RV(failed_updates) returning V(null)
    or a bare dict instead of a list. C(ForEach-Object) over an empty array returns
    C(null) in PowerShell; results are now wrapped in C(@()) to guarantee a JSON array
    is always returned."
  - "install_updates - Fix RV(total_updates_installed) returning V(null) when only one
    update matches the filter. C(Where-Object) returns a scalar C(CimInstance) (not an
    array) for single-item results; C(Get-AvailableUpdate) now wraps its return value
    in C(@()) and filters nulls to ensure C(.Count) always resolves correctly."
  - "install_updates - Fix RV(installed_updates[].reboot_required) always reporting
    V(false) regardless of post-installation state. The C(RebootRequired) WMI property
    is unreliable after installation; the field is now derived from C(EvaluationState)
    directly: states C(8) (PendingSoftReboot), C(9) (PendingHardReboot), and C(10)
    (WaitReboot) map to V(true), all other terminal states map to V(false)."
  - "install_updates - Fix RV(reboot_required) returning V(true) on idempotent re-runs
    where V(changed=false). When no updates are available the module now returns
    RV(reboot_required=false) instead of checking the Windows registry, keeping the
    return value scoped to what the current invocation actually did."
