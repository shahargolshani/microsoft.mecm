DOCUMENTATION:
  module: device_collection_info
  short_description: Retrieve Device Collection information from MECM
  description:
    - Returns information about one or all Device Collections in a Configuration Manager site.
    - Each returned collection includes its query and direct membership rules.
    - When no C(name) is provided, all device collections are returned.
  version_added: "1.1.0"
  extends_documentation_fragment:
    - microsoft.mecm.uses_cm_ps_module
  options:
    name:
      description:
        - Name of a specific device collection to retrieve.
        - When omitted, all device collections are returned.
        - A warning is emitted if the specified collection does not exist.
      type: str
      required: false
  author:
    - Ansible Ecosystem Engineering team (@eco-ansible-content)

EXAMPLES: |
  - name: Get all device collections
    microsoft.mecm.device_collection_info:
      site_code: "ECO"
    register: all_collections

  - name: Get a specific device collection
    microsoft.mecm.device_collection_info:
      site_code: "ECO"
      name: "Windows 11"
    register: dc_info

  - name: Show member count for a collection
    ansible.builtin.debug:
      msg: "{{ dc_info.device_collections[0].member_count }} devices in collection"

  - name: Show query rules for a specific collection
    ansible.builtin.debug:
      msg: "{{ dc_info.device_collections[0].device_collection_query_rules }}"

  - name: Show direct membership rules for a specific collection
    ansible.builtin.debug:
      msg: "{{ dc_info.device_collections[0].device_collection_direct_rules }}"

RETURN:
  device_collections:
    description: List of device collections matching the query.
    returned: always
    type: list
    elements: dict
    contains:
      name:
        description: Name of the device collection.
        type: str
        returned: always
        sample: "Windows 11"
      collection_id:
        description: The unique ID assigned to the collection by MECM.
        type: str
        returned: always
        sample: "ECO00042"
      limiting_collection_name:
        description: Name of the limiting collection that scopes this collection.
        type: str
        returned: always
        sample: "All Systems"
      refresh_type:
        description: The membership refresh type of the collection.
        type: str
        returned: always
        sample: "Periodic"
      member_count:
        description: Number of devices currently in the collection.
        type: int
        returned: always
        sample: 10
      comment:
        description: Optional description or comment for the collection.
        type: str
        returned: always
        sample: "All Windows 11 devices"
      is_built_in:
        description: Whether the collection is a built-in MECM collection.
        type: bool
        returned: always
        sample: false
      device_collection_query_rules:
        description: Query membership rules configured on the collection.
        type: list
        elements: dict
        returned: always
        contains:
          rule_name:
            description: Name of the query rule.
            type: str
            sample: "TPM Devices"
          query_expression:
            description: WQL query expression that defines membership.
            type: str
            sample: "select SMS_R_System.ResourceId from SMS_R_System ..."
      device_collection_direct_rules:
        description: Direct membership rules configured on the collection.
        type: list
        elements: dict
        returned: always
        contains:
          resource_id:
            description: ResourceID of the directly-added device.
            type: int
            sample: 16777219
          rule_name:
            description: Device name (RuleName) assigned by MECM to the direct rule.
            type: str
            sample: "WIN-UE71298AH9B"
